services:
  - type: web
    name: hospital-bulk
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: UPSTREAM_BASE_URL
        value: https://hospital-directory.onrender.com
      - key: MAX_CONCURRENCY
        value: "10"
      - key: ACTIVATE_ON_PARTIAL_FAILURE
        value: "false"
